services:
  - type: web
    name: secure-voice
    runtime: java
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/secure-voice-1.0.0.jar
    envVars:
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
